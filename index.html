<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>PortfolioSite</title>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio UI Study</title><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css'><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <main>

    <section class="tilespace">

        <img class="tile-flower tile-flower-about" src="about.png" alt="">

        <p>自己紹介</p>
      </article>
      <article class="tile tile-works">
        <h2>Works</h2>
        <p>作品一覧</p>
      </article>
      <article class="tile tile-blog">
        <h2>Blog</h2>

      <article class="tile tile-github">
        <h2>GitHub</h2>
        <p>外部リンク</p>

      <div class="sub-tile sub-tile-blue sub1"></div>
      <div class="sub-tile sub-tile-green sub2"></div>
      <div class="sub-tile sub-tile-ivory sub3"></div>
      <div class="sub-tile sub-tile-blue sub4"></div>
      <div class="sub-tile sub-tile-green sub5"></div>
      <div class="sub-tile sub-tile-green sub6"></div>
      <div class="sub-tile sub-tile-green sub7"></div>

      <div class="sub-tile sub-tile-ivory sub9"></div>
      <div class="sub-tile sub-tile-purple sub10"></div>
      <div class="sub-tile sub-tile-purple sub11"></div>
      <div class="sub-tile sub-tile-blue sub12"></div>
      <div class="sub-tile sub-tile-purple sub13"></div>
      <div class="sub-tile sub-tile-blue sub14"></div>
      <div class="sub-tile sub-tile-green sub15"></div>
      <div class="sub-tile sub-tile-ivory sub16"></div>

  </main>
    <script  src="./script.js"></script>

  </body>
  
</html>
